<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <title>RainNowCasting - Live Weather Prediction</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      color: #fff;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 2rem;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
    }

    .btn-primary {
      background: #4e73df;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      background: #224abe;
      transform: translateY(-2px);
    }

    .form-control {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      border-radius: 10px;
    }

    .form-control:focus {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      box-shadow: none;
      border-color: #4e73df;
    }

    .form-control option {
      background: #2c3e50;
      color: #fff;
    }

    label {
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .result-card {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 15px;
      padding: 1.5rem;
      margin-top: 2rem;
      display: none;
    }

    .weather-info {
      font-size: 1.1rem;
      margin-bottom: 1rem;
    }

    .nowcast-alert {
      border-radius: 10px;
      padding: 1rem;
      font-weight: 600;
    }

    .loading-spinner {
      display: none;
    }
  </style>
</head>

<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="text-center mb-5">
          <h1 class="display-4 font-weight-bold">RainNowCasting</h1>
          <p class="lead">Real-time rainfall prediction for Indian cities</p>
        </div>

        <div class="glass-card">
          <h5 class="mb-4 text-center">Select Location</h5>
          <form id="weatherForm">
            <div class="form-group">
              <label for="stateSelect">State</label>
              <select class="form-control" id="stateSelect" required>
                <option value="" disabled selected>Loading states...</option>
              </select>
            </div>
            <div class="form-group">
              <label for="citySelect">City</label>
              <select class="form-control" id="citySelect" required disabled>
                <option value="" disabled selected>Select state first</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary btn-block mt-4" id="predictBtn" disabled>
              <span class="spinner-border spinner-border-sm loading-spinner" id="btnSpinner"></span>
              Get Prediction
            </button>
          </form>

          <div id="resultArea" class="result-card">
            <h3 id="resultLocation" class="text-center mb-4">Location</h3>
            <div class="row text-center mb-4">
              <div class="col-6">
                <div class="weather-info">
                  <i class="fas fa-thermometer-half mr-2"></i>
                  <span id="temp">0</span>°C
                </div>
              </div>
              <div class="col-6">
                <div class="weather-info">
                  <i class="fas fa-tint mr-2"></i>
                  <span id="humidity">0</span>%
                </div>
              </div>
            </div>
            <div id="nowcastAlert" class="nowcast-alert text-center">
              <span id="nowcastMsg">Nowcast Info</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://kit.fontawesome.com/a076d05399.js"></script>
  <script>
    const API_KEY = "bd5e378503939ddaee76f12ad7a97608";
    const stateSelect = document.getElementById('stateSelect');
    const citySelect = document.getElementById('citySelect');
    const predictBtn = document.getElementById('predictBtn');
    const btnSpinner = document.getElementById('btnSpinner');
    const resultArea = document.getElementById('resultArea');

    // 1. Initialize States
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const response = await fetch('https://countriesnow.space/api/v0.1/countries/states', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ country: "India" })
        });
        const data = await response.json();
        const states = data.data.states;
        
        stateSelect.innerHTML = '<option value="" disabled selected>Select State</option>';
        states.forEach(state => {
          const option = document.createElement('option');
          option.value = state.name;
          option.textContent = state.name;
          stateSelect.appendChild(option);
        });
      } catch (error) {
        console.error("Error loading states:", error);
        stateSelect.innerHTML = '<option value="" disabled selected>Error loading states</option>';
      }
    });

    // 2. Load Cities
    stateSelect.addEventListener('change', async () => {
      const state = stateSelect.value;
      if (!state) return;

      citySelect.disabled = true;
      citySelect.innerHTML = '<option value="" disabled selected>Loading cities...</option>';
      predictBtn.disabled = true;

      try {
        const response = await fetch('https://countriesnow.space/api/v0.1/countries/state/cities', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ country: "India", state: state })
        });
        const data = await response.json();
        const cities = data.data;

        citySelect.innerHTML = '<option value="" disabled selected>Select City</option>';
        cities.forEach(city => {
          const option = document.createElement('option');
          option.value = city;
          option.textContent = city;
          citySelect.appendChild(option);
        });
        citySelect.disabled = false;
        predictBtn.disabled = false;
      } catch (error) {
        console.error("Error loading cities:", error);
        citySelect.innerHTML = '<option value="" disabled selected>Error loading cities</option>';
      }
    });

    // 3. Handle Prediction
    document.getElementById('weatherForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const city = citySelect.value;
      const state = stateSelect.value;
      if (!city) return;

      predictBtn.disabled = true;
      btnSpinner.style.display = 'inline-block';
      resultArea.style.display = 'none';

      try {
        const weatherUrl = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)},IN&appid=${API_KEY}&units=metric`;
        const response = await fetch(weatherUrl);
        const data = await response.json();

        if (data.cod !== 200) throw new Error(data.message);

        // Update UI
        document.getElementById('resultLocation').textContent = `${data.name}, ${state}`;
        document.getElementById('temp').textContent = Math.round(data.main.temp);
        document.getElementById('humidity').textContent = data.main.humidity;

        // Simple Nowcast Logic
        const humidity = data.main.humidity;
        const cloudiness = data.clouds.all;
        const pressure = data.main.pressure;
        
        let intensity = "No Rain";
        let message = "Clear skies expected.";
        let alertClass = "alert-success";

        if (humidity > 85 && cloudiness > 80) {
          intensity = "Heavy Rain";
          message = "High probability of heavy rainfall soon.";
          alertClass = "bg-danger";
        } else if (humidity > 70 && cloudiness > 50) {
          intensity = "Moderate Rain";
          message = "Moderate rain showers likely.";
          alertClass = "bg-warning text-dark";
        } else if (humidity > 50 || cloudiness > 30) {
          intensity = "Light Rain";
          message = "Possible light drizzle.";
          alertClass = "bg-info";
        } else {
          intensity = "Clear";
          message = "Dry conditions with clear skies.";
          alertClass = "bg-success";
        }

        const nowcastAlert = document.getElementById('nowcastAlert');
        nowcastAlert.className = `nowcast-alert text-center ${alertClass}`;
        document.getElementById('nowcastMsg').innerHTML = `<strong>${intensity}</strong>: ${message}`;
        
        resultArea.style.display = 'block';
        resultArea.scrollIntoView({ behavior: 'smooth' });

      } catch (error) {
        console.error("Prediction error:", error);
        alert("Could not fetch weather data. Please try again.");
      } finally {
        predictBtn.disabled = false;
        btnSpinner.style.display = 'none';
      }
    });
  </script>
</body>

</html>
