<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <title>Rainfall Nowcasting</title>
</head>

<body style="background-image: url('https://imgur.com/BAGXL6M.jpg'); background-size: cover; background-repeat: no-repeat; background-attachment: fixed;">
  <div class="container mt-5">
    <h1 class="text-center m-3 badge-primary text-wrap p-3 rounded">
      GetYourWeather Real-Time Nowcasting
    </h1>
    <div class="card mx-auto shadow-lg" style="max-width: 600px; background: rgba(255, 255, 255, 0.95);">
      <div class="card-body">
        <h5 class="card-title text-center mb-4">India State & City Wise Prediction</h5>
        <form id="locationForm">
          <div class="form-group">
            <label for="stateSelect">1. Select State</label>
            <select class="form-control" id="stateSelect" name="state" onchange="loadCities()" required>
              <option value="" disabled selected>Loading states...</option>
            </select>
          </div>
          <div class="form-group mt-3">
            <label for="citySelect">2. Select City</label>
            <select class="form-control" id="citySelect" name="city" required disabled>
              <option value="" disabled selected>Select a state first</option>
            </select>
          </div>
          <div class="text-center mt-4">
            <button type="button" id="predictBtn" class="btn btn-primary btn-lg btn-block" onclick="getPrediction()" disabled>
              Get Real-Time Rainfall Prediction
            </button>
          </div>
        </form>

        <!-- Prediction Result Area (Hidden by default) -->
        <div id="resultArea" class="mt-4" style="display: none;">
          <div class="card border-primary">
            <div class="card-header bg-primary text-white text-center">
              <h4 id="resultLocation">Location</h4>
            </div>
            <div class="card-body text-center">
              <div class="alert alert-info py-2 mb-0">
                <strong>Current:</strong> <span id="temp">0</span>°C, <span id="humidity">0</span>% Humidity
              </div>
              <div id="nowcastAlert" class="alert mt-3 py-2">
                <span id="nowcastMsg">Nowcast Info</span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="card-footer text-muted text-center small">
        Scalable dynamic location system with real-time OpenWeatherMap integration.
      </div>
    </div>
  </div>

  <script>
    // 1. Load states on page load
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const response = await fetch('/api/states');
        const states = await response.json();
        const stateSelect = document.getElementById('stateSelect');
        
        stateSelect.innerHTML = '<option value="" disabled selected>Select a state</option>';
        states.forEach(state => {
          const option = document.createElement('option');
          option.value = state;
          option.textContent = state;
          stateSelect.appendChild(option);
        });
      } catch (error) {
        console.error("Error loading states:", error);
        alert("Failed to load states list. Please refresh.");
      }
    });

    // 2. Load cities when state changes
    async function loadCities() {
      const stateSelect = document.getElementById('stateSelect');
      const citySelect = document.getElementById('citySelect');
      const predictBtn = document.getElementById('predictBtn');
      const state = stateSelect.value;
      
      if (!state) return;
      
      citySelect.disabled = true;
      citySelect.innerHTML = '<option value="" disabled selected>Loading cities...</option>';
      predictBtn.disabled = true;
      
      try {
        const response = await fetch(`/api/cities?state=${encodeURIComponent(state)}`);
        const cities = await response.json();
        
        citySelect.innerHTML = '<option value="" disabled selected>Select a city</option>';
        cities.forEach(city => {
          const option = document.createElement('option');
          option.value = city;
          option.textContent = city;
          citySelect.appendChild(option);
        });
        citySelect.disabled = false;
        predictBtn.disabled = false;
      } catch (error) {
        console.error("Error loading cities:", error);
        citySelect.innerHTML = '<option value="" disabled selected>Error loading cities</option>';
      }
    }

    // 3. Get Prediction
    async function getPrediction() {
      const state = document.getElementById('stateSelect').value;
      const city = document.getElementById('citySelect').value;
      const resultArea = document.getElementById('resultArea');
      const predictBtn = document.getElementById('predictBtn');
      
      if (!state || !city) return;
      
      predictBtn.disabled = true;
      predictBtn.textContent = "Fetching real-time data...";
      
      try {
        const response = await fetch('/api/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ state, city })
        });
        
        const result = await response.json();
        
        if (result.status === "success") {
          document.getElementById('resultLocation').textContent = `${result.location}, ${result.state}`;
          document.getElementById('temp').textContent = result.temperature;
          document.getElementById('humidity').textContent = result.humidity;
          
          const nowcastAlert = document.getElementById('nowcastAlert');
          const nowcastMsg = document.getElementById('nowcastMsg');
          nowcastMsg.textContent = result.nowcast.message;
          
          // Style nowcast based on intensity
          nowcastAlert.className = "alert mt-3 py-2 " + 
            (result.nowcast.intensity.includes("Heavy") ? "alert-danger" : 
             result.nowcast.intensity.includes("Moderate") ? "alert-warning" : "alert-success");
          
          resultArea.style.display = "block";
          resultArea.scrollIntoView({ behavior: 'smooth' });
        } else {
          alert(result.message || "An error occurred during prediction.");
        }
      } catch (error) {
        console.error("Prediction error:", error);
        alert("Network error. Please try again.");
      } finally {
        predictBtn.disabled = false;
        predictBtn.textContent = "Get Real-Time Rainfall Prediction";
      }
    }
  </script>
</body>

</html>
